apiVersion: apps/v1
kind: Deployment
metadata: { name: checkpoint-ai, labels: { app: checkpoint-ai } }
spec:
  replicas: 1
  selector: { matchLabels: { app: checkpoint-ai } }
  template:
    metadata: { labels: { app: checkpoint-ai } }
    spec:
      containers:
        - name: checkpoint-ai
          image: ghcr.io/cognis-digital/checkpoint-ai:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: checkpoint-ai }
spec:
  selector: { app: checkpoint-ai }
  ports: [{ port: 80, targetPort: 8000 }]
